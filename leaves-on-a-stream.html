<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Leaves on a Stream — Maps & Mirrors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3efe6;
    --paper: #ebe5d6;
    --ink: #2f2d28;
    --ink-soft: #6b685f;
    --ink-mute: #9c9789;
    --hair: #d8d2c2;
    --hair-soft: #e3ddcd;
    --shimmer: #eef1e3;
    --leaf-a: #8a9d72;
    --leaf-b: #7a8e64;
    --leaf-c: #9aae82;
    --leaf-d: #6b7d54;
    --leaf-e: #a4b58c;
    --accent: #6f8458;
    --serif: "Cormorant Garamond", "Hoefler Text", Georgia, serif;
    --sans: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: stretch; justify-content: center;
  }

  /* ---------- App shell ---------- */
  .app {
    position: relative; width: 100%; max-width: 1200px;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; overflow: hidden;
    background: radial-gradient(1200px 600px at 50% -10%, #f8f4ea 0%, var(--bg) 60%);
  }

  .topbar {
    position: relative; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 14px; color: var(--ink-soft);
    font-size: 13px; letter-spacing: 0.02em;
  }
  .topbar .title { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--ink); }
  .topbar .crumb {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--ink-mute);
  }
  .topbar .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-mute); }
  .topbar .leave {
    background: none; border: none; font: inherit; color: var(--ink-soft);
    cursor: pointer; padding: 6px 10px; border-radius: 999px;
    transition: background 200ms ease, color 200ms ease;
  }
  .topbar .leave:hover { background: var(--hair-soft); color: var(--ink); }
  .topbar .leave:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- Stage ---------- */
  .stage {
    position: relative; flex: 1; min-height: 560px;
    margin: 8px 24px 0; border-radius: 20px; overflow: hidden;
    /* Soft warm sky → distant air */
    background:
      linear-gradient(180deg, #efeadc 0%, #e6e1d1 40%, #ddd6c2 70%, #d3cab2 100%);
    box-shadow: inset 0 0 0 1px var(--hair-soft);
  }

  /* The whole scene is built as layered SVGs that fill the stage.
     Each layer establishes one band of depth: sky, far hills, far bank,
     stream, near bank, foreground grass. */
  .scene-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .scene-layer svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* The leaves layer covers the same coordinate space, on top of the stream
     but beneath the near-bank/grass layers (so leaves can disappear behind
     the foreground grass at the very bottom). */
  .leaves {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 8; /* between stream(5) and near-bank(10) */
    overflow: hidden;
  }

  /* A leaf drifts along the stream from upper-right (distance) to lower-left (past viewer).
     Position interpolates between (--start-x, --start-y) and (--end-x, --end-y) — both in % of stage.
     Scale grows from --start-scale (small, distant) to --end-scale (large, close). */
  .leaf {
    position: absolute;
    will-change: transform, opacity;
    left: var(--start-x, 70%);
    top:  var(--start-y, 38%);
    transform: translate(-50%, -50%) scale(var(--start-scale, 0.28)) rotate(var(--rot, -8deg));
    opacity: 0;
    animation:
      leaf-flow var(--dur, 36s) cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards,
      leaf-bob calc(var(--dur, 36s) / 9) ease-in-out infinite alternate;
  }
  .leaf .shape {
    position: relative;
    width: 86px; height: 56px;
    filter: drop-shadow(0 3px 5px rgba(40, 50, 25, 0.18));
  }
  .leaf .shape svg { display: block; width: 100%; height: 100%; }
  .leaf .label {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--serif); font-style: italic;
    font-size: 14px; line-height: 1.15; color: #2c3526;
    text-align: center; max-width: 76px; padding: 0 6px;
    pointer-events: none; text-wrap: pretty;
  }

  @keyframes leaf-flow {
    0% {
      left: var(--start-x); top: var(--start-y);
      transform: translate(-50%, -50%) scale(var(--start-scale)) rotate(var(--rot));
      opacity: 0;
      filter: blur(0);
    }
    6%  { opacity: 1; }
    92% { opacity: 1; filter: blur(0.3px); }
    100% {
      left: var(--end-x); top: var(--end-y);
      transform: translate(-50%, -50%) scale(var(--end-scale)) rotate(var(--rot));
      opacity: 0.85;
      filter: blur(0.6px);
    }
  }
  @keyframes leaf-bob {
    from { margin-top: -2px; }
    to   { margin-top: 2px; }
  }

  /* Pause */
  .app.paused .leaf,
  .app.paused .water-anim,
  .app.paused .reed,
  .app.paused .prompt { animation-play-state: paused !important; }

  /* Subtle current shimmer — drawn as moving SVG paths inside the stream layer */
  .water-anim {
    animation: water-shift 22s linear infinite;
  }
  @keyframes water-shift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(40px); }
  }
  .reed { transform-origin: bottom center; animation: sway 7s ease-in-out infinite alternate; }
  .reed.r2 { animation-duration: 9s; animation-delay: -2s; }
  .reed.r3 { animation-duration: 8s; animation-delay: -4s; }
  @keyframes sway {
    from { transform: rotate(-2deg); }
    to   { transform: rotate(2deg); }
  }

  /* ---------- Prompts ---------- */
  .prompt-layer {
    position: absolute;
    left: 0; right: 0;
    top: 6%;
    z-index: 20;
    display: flex; justify-content: center;
    pointer-events: none;
    padding: 0 32px;
  }
  .prompt {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(20px, 2.6vw, 26px);
    line-height: 1.45;
    color: var(--ink);
    max-width: 600px;
    min-height: 2.9em;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    background: rgba(243, 239, 230, 0.78);
    padding: 14px 24px;
    border-radius: 14px;
    opacity: 0; transform: translateY(6px);
    animation: prompt-in 1200ms ease-out forwards;
  }
  .prompt.out { animation: prompt-out 1200ms ease-in forwards; }
  @keyframes prompt-in  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes prompt-out { from { opacity: 1; transform: translateY(0); }  to { opacity: 0; transform: translateY(-6px); } }

  /* ---------- Controls ---------- */
  .controls {
    position: relative; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 18px 32px 28px; flex-wrap: wrap;
  }
  .controls .group { display: flex; align-items: center; gap: 8px; }

  .ctrl {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--hair);
    color: var(--ink-soft);
    font: 500 13px/1 var(--sans); letter-spacing: 0.02em;
    padding: 10px 14px; border-radius: 999px; cursor: pointer;
    transition: background 220ms ease, color 220ms ease, border-color 220ms ease;
  }
  .ctrl:hover { background: var(--hair-soft); color: var(--ink); }
  .ctrl:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .ctrl[aria-pressed="true"] { background: #e8e2d2; color: var(--ink); border-color: #c9bf9f; }
  .ctrl svg { width: 14px; height: 14px; flex: none; }

  .place {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink); color: var(--paper); border: none;
    font: 500 14px/1 var(--sans); padding: 14px 22px; border-radius: 999px;
    cursor: pointer; transition: background 220ms ease;
  }
  .place:hover { background: #1f1d1a; }
  .place:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .place .leaf-icon { width: 16px; height: 16px; }

  /* Composer */
  .composer-wrap {
    position: absolute; left: 0; right: 0; bottom: 100px;
    z-index: 40; display: flex; justify-content: center;
    padding: 0 24px; pointer-events: none;
  }
  .composer {
    pointer-events: auto;
    display: flex; align-items: center; gap: 10px;
    width: min(560px, 100%);
    background: rgba(248, 244, 234, 0.96);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--hair); border-radius: 18px;
    padding: 12px 12px 12px 18px;
    box-shadow: 0 12px 30px -16px rgba(60,55,40,0.25);
    transform: translateY(12px); opacity: 0;
    transition: opacity 260ms ease, transform 260ms ease;
  }
  .composer.open { opacity: 1; transform: translateY(0); }
  .composer .hint { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--ink-mute); flex: none; }
  .composer input {
    flex: 1; background: transparent; border: none;
    font: 400 16px/1.3 var(--serif); color: var(--ink);
    padding: 8px 4px; min-width: 0;
  }
  .composer input::placeholder { color: var(--ink-mute); font-style: italic; }
  .composer input:focus { outline: none; }
  .composer .release {
    border: none; background: var(--accent); color: #f4f1e7;
    font: 500 13px/1 var(--sans); padding: 10px 14px; border-radius: 999px; cursor: pointer;
  }
  .composer .release:hover { background: #5e7349; }
  .composer .close { border: none; background: transparent; color: var(--ink-mute); cursor: pointer; padding: 6px; border-radius: 999px; }
  .composer .close:hover { color: var(--ink); }

  /* small caption */
  .footnote {
    position: absolute;
    left: 50%; bottom: 14px;
    transform: translateX(-50%);
    font-family: var(--serif); font-style: italic;
    color: rgba(45,50,30,0.55);
    font-size: 13px; z-index: 25; pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .water-anim, .reed { animation: none !important; }
  }

  @media (max-width: 640px) {
    .topbar { padding: 14px 16px 8px; }
    .topbar .title { font-size: 15px; }
    .topbar .crumb { font-size: 11px; letter-spacing: 0.14em; }
    .stage { margin: 4px 12px 0; min-height: 480px; border-radius: 16px; }
    .controls { padding: 14px 16px 22px; gap: 10px; }
    .ctrl { padding: 9px 12px; font-size: 12px; }
    .place { padding: 12px 18px; font-size: 13px; }
    .composer-wrap { bottom: 92px; padding: 0 12px; }
    .prompt { font-size: 18px; padding: 10px 16px; }
    .leaf .shape { width: 72px; height: 48px; }
    .leaf .label { font-size: 13px; max-width: 64px; }
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
  .app.hide-prompts .prompt-layer { display: none; }
</style>
</head>
<body>

<div class="app" id="app" data-screen-label="Leaves on a Stream">
  <header class="topbar">
    <div class="title">Maps &amp; Mirrors</div>
    <div class="crumb">
      <span>Practices</span>
      <span class="dot" aria-hidden="true"></span>
      <span>Noticing thoughts</span>
    </div>
    <button class="leave" type="button" aria-label="Leave the practice">Leave gently</button>
  </header>

  <main class="stage" id="stage" aria-label="A quiet stream with leaves drifting past">

    <!-- ── Layer 1: distant hills / tree line ── -->
    <div class="scene-layer" style="z-index:1;" aria-hidden="true">
      <svg viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#c8c9b4"/>
            <stop offset="1" stop-color="#b9bba2"/>
          </linearGradient>
          <linearGradient id="hillGrad2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#aab39a"/>
            <stop offset="1" stop-color="#98a387"/>
          </linearGradient>
        </defs>
        <!-- Far hills (hazy) -->
        <path d="M0,260 Q150,240 280,250 T520,244 T780,252 T1020,242 T1200,250 L1200,330 L0,330 Z"
              fill="url(#hillGrad)" opacity="0.85"/>
        <!-- A second, slightly nearer hill ridge -->
        <path d="M0,290 Q200,272 380,282 T720,278 T1080,284 T1200,280 L1200,340 L0,340 Z"
              fill="url(#hillGrad2)" opacity="0.85"/>
        <!-- Distant tree silhouettes along the ridge -->
        <g fill="#8a9476" opacity="0.7">
          <ellipse cx="180" cy="282" rx="14" ry="10"/>
          <ellipse cx="220" cy="285" rx="10" ry="7"/>
          <ellipse cx="340" cy="280" rx="18" ry="12"/>
          <ellipse cx="380" cy="284" rx="11" ry="8"/>
          <ellipse cx="540" cy="282" rx="16" ry="11"/>
          <ellipse cx="700" cy="278" rx="20" ry="13"/>
          <ellipse cx="740" cy="282" rx="12" ry="8"/>
          <ellipse cx="900" cy="282" rx="15" ry="10"/>
          <ellipse cx="1050" cy="284" rx="18" ry="12"/>
        </g>
      </svg>
    </div>

    <!-- ── Layer 2: far bank (across the stream) ── -->
    <div class="scene-layer" style="z-index:2;" aria-hidden="true">
      <svg viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="farBankGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#a8b395"/>
            <stop offset="1" stop-color="#92a07d"/>
          </linearGradient>
        </defs>
        <!-- Far bank: gently undulating line; the bank meets the water along this curve -->
        <path d="M0,330 C 120,322 240,346 380,338 C 520,330 660,352 820,344 C 950,338 1080,348 1200,340 L1200,400 L0,400 Z"
              fill="url(#farBankGrad)"/>
        <!-- bank texture: small grass tufts -->
        <g stroke="#7d8a66" stroke-width="1.2" fill="none" opacity="0.55">
          <path d="M70 336 q-2 -8 0 -14 M76 336 q-1 -8 4 -14 M82 336 q1 -8 7 -14"/>
          <path d="M260 342 q-2 -8 0 -14 M266 342 q-1 -8 4 -14"/>
          <path d="M460 338 q-2 -8 0 -14 M466 338 q-1 -8 4 -14 M472 338 q1 -8 7 -14"/>
          <path d="M700 348 q-2 -8 0 -14 M706 348 q-1 -8 4 -14"/>
          <path d="M920 342 q-2 -8 0 -14 M926 342 q-1 -8 4 -14 M932 342 q1 -8 7 -14"/>
          <path d="M1100 340 q-2 -8 0 -14 M1106 340 q-1 -8 4 -14"/>
        </g>
        <!-- Reflection edge: thin softer band right where bank meets water -->
        <path d="M0,332 C 120,324 240,348 380,340 C 520,332 660,354 820,346 C 950,340 1080,350 1200,342"
              stroke="#c4cdb0" stroke-width="2" fill="none" opacity="0.7"/>
      </svg>
    </div>

    <!-- ── Layer 3: the stream (water surface) ── -->
    <div class="scene-layer" style="z-index:3;" aria-hidden="true">
      <svg viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0"   stop-color="#bccab0"/>
            <stop offset="0.4" stop-color="#a8bb9b"/>
            <stop offset="0.8" stop-color="#8ea582"/>
            <stop offset="1"   stop-color="#7c9670"/>
          </linearGradient>
          <linearGradient id="waterFade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#e6e1d2" stop-opacity="0.45"/>
            <stop offset="1" stop-color="#e6e1d2" stop-opacity="0"/>
          </linearGradient>
        </defs>

        <!-- Water body — top edge meets the far bank; bottom edge runs roughly straight
             across the stage so the near shoreline reads as a horizon, not a diagonal. -->
        <path d="M0,340 C 120,332 240,356 380,348 C 520,340 660,362 820,354 C 950,348 1080,358 1200,350
                 L1200,586 C 1000,594 800,576 600,584 C 400,592 200,572 0,580 Z"
              fill="url(#waterGrad)"/>

        <!-- Haze along far edge -->
        <path d="M0,340 C 120,332 240,356 380,348 C 520,340 660,362 820,354 C 950,348 1080,358 1200,350
                 L1200,400 L0,400 Z"
              fill="url(#waterFade)"/>

        <!-- Current lines — flow downstream (rightward in the diagonal frame). -->
        <g class="water-anim" stroke="#dde6cb" stroke-linecap="round" fill="none" opacity="0.7">
          <path d="M120 360 q40 -2 80 0"  stroke-width="1"  opacity="0.55"/>
          <path d="M340 364 q50 -2 100 0" stroke-width="1"  opacity="0.5"/>
          <path d="M620 370 q60 -2 120 0" stroke-width="1"  opacity="0.55"/>
          <path d="M880 366 q50 -2 100 0" stroke-width="1"  opacity="0.5"/>
          <path d="M260 410 q70 -3 140 0"  stroke-width="1.1" opacity="0.55"/>
          <path d="M540 418 q90 -3 180 0"  stroke-width="1.1" opacity="0.6"/>
          <path d="M820 412 q80 -3 160 0"  stroke-width="1.1" opacity="0.55"/>
          <path d="M380 480 q110 -4 220 0" stroke-width="1.3" opacity="0.6"/>
          <path d="M640 500 q130 -4 260 0" stroke-width="1.3" opacity="0.6"/>
          <path d="M880 530 q120 -4 240 0" stroke-width="1.3" opacity="0.55"/>
          <path d="M520 580 q160 -5 320 0" stroke-width="1.5" opacity="0.55"/>
          <path d="M820 610 q140 -5 280 0" stroke-width="1.5" opacity="0.5"/>
        </g>

        <!-- Far-bank reflection band -->
        <g opacity="0.18">
          <path d="M0,346 C 120,338 240,362 380,354 C 520,346 660,368 820,360 C 950,354 1080,364 1200,356 L1200,372 L0,372 Z"
                fill="#7d8a66"/>
        </g>
      </svg>
    </div>

    <!-- ── Layer 4: leaves drift here, on the water surface ── -->
    <div class="leaves" id="leaves" aria-live="polite" aria-relevant="additions"></div>

    <!-- ── Layer 5: near (foreground) bank — the viewer's vantage ── -->
    <div class="scene-layer" style="z-index:10;" aria-hidden="true">
      <svg viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="nearBankGrad" x1="0" y1="0" x2="0.4" y2="1">
            <stop offset="0"   stop-color="#9fa97e"/>
            <stop offset="0.5" stop-color="#838d62"/>
            <stop offset="1"   stop-color="#65704a"/>
          </linearGradient>
          <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#8e9b6e"/>
            <stop offset="1" stop-color="#5d6a42"/>
          </linearGradient>
          <radialGradient id="bankWarmth" cx="0.18" cy="0.95" r="0.6">
            <stop offset="0" stop-color="#a8b282" stop-opacity="0.55"/>
            <stop offset="1" stop-color="#a8b282" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- The foreground bank runs roughly straight across the bottom of the stage.
             Slight undulation keeps the shoreline from looking ruled. -->
        <path d="M0,580
                 C 200,572 400,592 600,584
                 C 800,576 1000,594 1200,586
                 L1200,700 L0,700 Z"
              fill="url(#nearBankGrad)"/>
        <path d="M0,580
                 C 200,572 400,592 600,584
                 C 800,576 1000,594 1200,586
                 L1200,700 L0,700 Z"
              fill="url(#bankWarmth)"/>

        <!-- Pebbles scattered along the (now horizontal) water's edge -->
        <g opacity="0.85">
          <ellipse cx="60"   cy="586" rx="22" ry="5" fill="#8e8a6c"/>
          <ellipse cx="170"  cy="582" rx="24" ry="6" fill="#a09c7e"/>
          <ellipse cx="290"  cy="590" rx="20" ry="5" fill="#928c6e"/>
          <ellipse cx="410"  cy="588" rx="22" ry="5" fill="#a8a280"/>
          <ellipse cx="540"  cy="584" rx="20" ry="5" fill="#928c6e"/>
          <ellipse cx="680"  cy="590" rx="22" ry="5" fill="#a8a280"/>
          <ellipse cx="820"  cy="586" rx="18" ry="5" fill="#8e8a6c"/>
          <ellipse cx="950"  cy="590" rx="20" ry="5" fill="#a8a280"/>
          <ellipse cx="1080" cy="586" rx="18" ry="5" fill="#928c6e"/>
        </g>

        <!-- Grass tufts dotted across the bank, just below the shoreline -->
        <g stroke="#4d5a36" stroke-width="1" fill="none" opacity="0.55">
          <path d="M40  610 q-2 -16 0 -28 M48 612 q-1 -18 4 -30 M56 612 q1 -20 7 -32"/>
          <path d="M210 614 q-2 -16 0 -28 M218 616 q-1 -18 4 -30"/>
          <path d="M360 612 q-2 -14 0 -24 M368 614 q-1 -16 4 -28 M376 614 q1 -18 7 -28"/>
          <path d="M520 616 q-2 -14 0 -24 M528 618 q-1 -16 4 -26"/>
          <path d="M700 612 q-2 -12 0 -22 M708 614 q-1 -14 4 -22 M716 614 q1 -16 7 -24"/>
          <path d="M880 616 q-2 -12 0 -20 M888 618 q-1 -14 4 -22"/>
          <path d="M1050 612 q-2 -14 0 -22 M1058 614 q-1 -16 4 -22 M1066 614 q1 -16 7 -24"/>
        </g>

        <!-- Tall reeds in the immediate foreground (left edge, closest to viewer) -->
        <g fill="#4a5733">
          <g class="reed" style="transform-origin: 30px 700px;">
            <path d="M26 700 q-3 -120 0 -200 q1 -10 4 -16 q1 12 -1 26 q-2 30 -3 190 z"/>
          </g>
          <g class="reed r2" style="transform-origin: 70px 700px;">
            <path d="M66 700 q-2 -110 0 -180 q1 -8 4 -14 q1 10 -1 22 q-2 28 -3 172 z"/>
          </g>
          <g class="reed r3" style="transform-origin: 110px 700px;">
            <path d="M106 700 q-3 -130 0 -210 q1 -10 4 -16 q1 12 -1 26 q-2 30 -3 200 z"/>
          </g>
          <g class="reed" style="transform-origin: 160px 700px; animation-delay: -3s;">
            <path d="M156 700 q-2 -100 0 -160 q1 -8 4 -14 q1 10 -1 22 q-2 28 -3 152 z"/>
          </g>
        </g>

        <!-- Subtle shadow cast by the near bank onto the water along the edge -->
        <path d="M0,576
                 C 200,568 400,588 600,580
                 C 800,572 1000,590 1200,582
                 L1200,594
                 C 1000,602 800,584 600,592
                 C 400,600 200,580 0,588 Z"
              fill="#3d4a30" opacity="0.18"/>
      </svg>
    </div>

    <!-- Prompts (top, so they don't sit on the water) -->
    <div class="prompt-layer">
      <div class="prompt" id="prompt" role="status" aria-live="polite">Settle in. Take a breath.</div>
    </div>

    <!-- A faint label, like a chapter marking -->
    <div class="footnote">Leaves on a Stream</div>

    <!-- Composer -->
    <div class="composer-wrap" aria-hidden="true">
      <form class="composer" id="composer" autocomplete="off" novalidate>
        <span class="hint" aria-hidden="true">a thought —</span>
        <label for="thoughtInput" class="sr-only">Type a thought to place on a leaf</label>
        <input id="thoughtInput" name="thought" type="text" maxlength="80" placeholder="what came to mind?" />
        <button type="submit" class="release">Place on leaf</button>
        <button type="button" class="close" id="composerClose" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3 L11 11 M11 3 L3 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
        </button>
      </form>
    </div>
  </main>

  <footer class="controls" aria-label="Practice controls">
    <div class="group" role="group" aria-label="Playback">
      <button class="ctrl" id="pauseBtn" aria-pressed="false" aria-label="Pause the scene">
        <svg viewBox="0 0 14 14" aria-hidden="true"><rect x="3" y="2.5" width="2.5" height="9" rx="0.6" fill="currentColor"/><rect x="8.5" y="2.5" width="2.5" height="9" rx="0.6" fill="currentColor"/></svg>
        <span id="pauseLabel">Pause</span>
      </button>
      <button class="ctrl" id="replayBtn" aria-label="Replay the guidance">
        <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M11.5 7a4.5 4.5 0 1 1-1.32-3.18" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/><path d="M11.6 1.8 V 4.4 H 9" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
        Replay
      </button>
      <button class="ctrl" id="skipBtn" aria-label="Skip the guidance">
        <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 3 L9 7 L3 11 Z" fill="currentColor"/><rect x="9.5" y="3" width="1.6" height="8" rx="0.4" fill="currentColor"/></svg>
        Skip
      </button>
    </div>

    <button class="place" id="placeBtn" aria-haspopup="dialog" aria-expanded="false">
      <svg class="leaf-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3 C15 6 15 14 10 17 C5 14 5 6 10 3 Z" fill="#a4b58c"/><path d="M10 3 L10 17" stroke="#5e7349" stroke-width="0.8"/></svg>
      Place a thought
    </button>

    <div class="group" role="group" aria-label="Comfort">
      <button class="ctrl" id="soundBtn" aria-pressed="true" aria-label="Toggle ambient sound">
        <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 5 H 5 L 8 3 V 11 L 5 9 H 3 Z" fill="currentColor"/><path d="M10 5 q1.6 2 0 4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
        Stream sound
      </button>
    </div>
  </footer>
</div>

<script>
(() => {
  // Production defaults (previously set by the dev tweaks panel, now hardcoded).
  // The original Tweaks UI is dev-only and has been stripped; these values
  // preserve the author's chosen visual.
  if (!window.__leafTweaks) {
    window.__leafTweaks = { scaleMul: 0.75, durMul: 1 };
  }

  const app = document.getElementById('app');
  const leavesEl = document.getElementById('leaves');
  const promptEl = document.getElementById('prompt');
  const composer = document.getElementById('composer');
  const composerWrap = composer.parentElement;
  const composerClose = document.getElementById('composerClose');
  const placeBtn = document.getElementById('placeBtn');
  const thoughtInput = document.getElementById('thoughtInput');
  const pauseBtn = document.getElementById('pauseBtn');
  const pauseLabel = document.getElementById('pauseLabel');
  const replayBtn = document.getElementById('replayBtn');
  const skipBtn = document.getElementById('skipBtn');
  const soundBtn = document.getElementById('soundBtn');

  // "Leave gently" — try to close the tab if this was opened from the tool;
  // fall back to history.back() if the user navigated here via in-page link;
  // final fallback is to navigate to index.html. Wrapped so a missing button
  // (or future markup change) doesn't throw.
  try {
    const leaveBtn = document.querySelector('.leave');
    if (leaveBtn) {
      leaveBtn.addEventListener('click', function() {
        // window.close() only succeeds when this window was opened by script
        // (e.g., via window.open from index.html). In other cases the call is
        // silently ignored; we then try to go back, then fall back to index.
        try { window.close(); } catch(e) {}
        // If still open after the close attempt, route gracefully.
        setTimeout(function() {
          try {
            if (document.referrer && document.referrer.indexOf(window.location.origin) === 0) {
              history.back();
            } else {
              window.location.href = 'index.html';
            }
          } catch(e) {
            window.location.href = 'index.html';
          }
        }, 80);
      });
    }
  } catch(e) {}


  const PROMPTS = [
    "Settle in. Take a breath.",
    "Imagine sitting beside a stream.",
    "When a thought appears, place it on a leaf.",
    "Let it drift by in its own time.",
    "If another thought appears, place that on a leaf too.",
    "There is nothing to fix. Nothing to chase.",
    "Stay as long as you like."
  ];

  const LEAF_SVGS = [
    `<svg viewBox="0 0 86 56"><path d="M4 28 C 22 6, 64 6, 82 28 C 64 50, 22 50, 4 28 Z" fill="var(--leaf-a)"/><path d="M4 28 L 82 28" stroke="#5a6c47" stroke-width="0.8" opacity="0.55"/></svg>`,
    `<svg viewBox="0 0 86 56"><path d="M6 30 C 12 8, 70 6, 80 26 C 78 50, 18 52, 6 30 Z" fill="var(--leaf-b)"/><path d="M8 30 L 78 26" stroke="#4f5f3e" stroke-width="0.8" opacity="0.5"/></svg>`,
    `<svg viewBox="0 0 86 56"><path d="M3 28 C 20 8, 68 8, 83 28 C 66 48, 20 48, 3 28 Z" fill="var(--leaf-c)"/><path d="M3 28 L 83 28" stroke="#5a6c47" stroke-width="0.7" opacity="0.5"/></svg>`,
    `<svg viewBox="0 0 86 56"><path d="M5 28 C 22 4, 64 4, 81 28 C 64 52, 22 52, 5 28 Z" fill="var(--leaf-d)"/><path d="M5 28 L 81 28" stroke="#3d4a32" stroke-width="0.8" opacity="0.55"/></svg>`,
    `<svg viewBox="0 0 86 56"><path d="M4 28 C 22 6, 64 6, 82 28 C 64 50, 22 50, 4 28 Z" fill="var(--leaf-e)"/><path d="M4 28 L 82 28" stroke="#5a6c47" stroke-width="0.7" opacity="0.45"/></svg>`,
  ];

  const rand = (a, b) => Math.random() * (b - a) + a;
  const pick = (a) => a[Math.floor(Math.random() * a.length)];

  let promptIdx = 0;
  let promptTimer = null;
  let ambientTimer = null;

    // The water surface runs diagonally now:
    //   far edge:  top of stream band (y ≈ 50% of stage)
    //   near edge: a diagonal from upper-left (y ≈ 60%) down to mid-right (y ≈ 90%)
    // Current flows from upper-RIGHT (distant on the water) toward lower-LEFT (past viewer).
    function makeLeaf(label, options = {}) {
      const leaf = document.createElement('div');
      leaf.className = 'leaf' + (label ? ' with-label' : '');

      // Start: off-screen LEFT, drifting straight across the stream
      const startX = options.startX != null ? options.startX : rand(-14, -6);
      const startY = options.startY != null ? options.startY : rand(58, 74);
      // End: off-screen RIGHT, at roughly the same height (gentle drift, no major depth change)
      const endX   = options.endX   != null ? options.endX   : rand(106, 118);
      const endY   = options.endY != null ? options.endY : (startY + rand(-3, 3));

      const sMul = window.__leafTweaks ? window.__leafTweaks.scaleMul : 1;
      const dMul = window.__leafTweaks ? window.__leafTweaks.durMul : 1;
      const baseScale = label ? 0.95 : rand(0.85, 1.05);
      const startScale = baseScale * sMul;
      const endScale   = baseScale * sMul;
      const dur = (options.dur != null ? options.dur : (label ? rand(34, 42) : rand(38, 52))) * dMul;
      const rot = options.rot != null ? options.rot : rand(-18, 18);
      const svg = options.svg || pick(LEAF_SVGS);

    leaf.style.setProperty('--start-x', startX + '%');
    leaf.style.setProperty('--start-y', startY + '%');
    leaf.style.setProperty('--end-x',   endX + '%');
    leaf.style.setProperty('--end-y',   endY + '%');
    leaf.style.setProperty('--start-scale', startScale);
    leaf.style.setProperty('--end-scale',   endScale);
    leaf.style.setProperty('--dur', dur + 's');
    leaf.style.setProperty('--rot', rot + 'deg');

    const shape = document.createElement('div');
    shape.className = 'shape';
    shape.innerHTML = svg;
    leaf.appendChild(shape);

    if (label) {
      const lbl = document.createElement('div');
      lbl.className = 'label';
      lbl.textContent = label;
      leaf.appendChild(lbl);
    }

    leavesEl.appendChild(leaf);
    setTimeout(() => leaf.remove(), dur * 1000 + 1000);
    return leaf;
  }

  // ── Prompts ──
  function showPrompt(text) {
    promptEl.classList.remove('out');
    promptEl.style.animation = 'none';
    void promptEl.offsetWidth;
    promptEl.style.animation = '';
    promptEl.textContent = text;
  }
  function fadePromptOut(then) {
    promptEl.classList.add('out');
    setTimeout(() => { promptEl.classList.remove('out'); then && then(); }, 1100);
  }
  function startPromptCycle() {
    clearTimeout(promptTimer);
    promptIdx = 0;
    showPrompt(PROMPTS[0]);
    scheduleNextPrompt();
  }
  function scheduleNextPrompt() {
    clearTimeout(promptTimer);
    promptTimer = setTimeout(() => {
      if (app.classList.contains('paused')) { scheduleNextPrompt(); return; }
      promptIdx++;
      if (promptIdx >= PROMPTS.length) {
        fadePromptOut(() => showPrompt("Stay as long as you like."));
        return;
      }
      fadePromptOut(() => { showPrompt(PROMPTS[promptIdx]); scheduleNextPrompt(); });
    }, 9000);
  }
  function skipGuidance() {
    clearTimeout(promptTimer);
    fadePromptOut(() => showPrompt("Stay as long as you like."));
  }

  function startAmbientLeaves() {
    const tick = () => {
      if (!app.classList.contains('paused') && leavesEl.children.length < 4) {
        makeLeaf(null);
      }
      const base = (window.__ambientFreq || 12) * 1000;
      ambientTimer = setTimeout(tick, rand(base * 0.75, base * 1.3));
    };
    window.__setAmbientFreq = (s) => { window.__ambientFreq = s; };
    setTimeout(() => makeLeaf(null), 1200);
    setTimeout(() => makeLeaf(null), 9000);
    ambientTimer = setTimeout(tick, 14000);
  }

  // ── Composer ──
  function openComposer() {
    composer.classList.add('open');
    composerWrap.setAttribute('aria-hidden', 'false');
    placeBtn.setAttribute('aria-expanded', 'true');
    setTimeout(() => thoughtInput.focus(), 60);
  }
  function closeComposer() {
    composer.classList.remove('open');
    composerWrap.setAttribute('aria-hidden', 'true');
    placeBtn.setAttribute('aria-expanded', 'false');
    thoughtInput.value = '';
  }
  placeBtn.addEventListener('click', () => {
    composer.classList.contains('open') ? closeComposer() : openComposer();
  });
  composerClose.addEventListener('click', closeComposer);
  composer.addEventListener('submit', (e) => {
    e.preventDefault();
    const v = thoughtInput.value.trim();
    if (!v) { closeComposer(); return; }
    makeLeaf(v);
    closeComposer();
  });
  thoughtInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeComposer(); });

  // ── Pause / Replay / Skip ──
  function setPaused(p) {
    app.classList.toggle('paused', p);
    pauseBtn.setAttribute('aria-pressed', p ? 'true' : 'false');
    pauseLabel.textContent = p ? 'Resume' : 'Pause';
    pauseBtn.setAttribute('aria-label', p ? 'Resume the scene' : 'Pause the scene');
    if (p) audio.pause(); else if (audioOn) audio.resume();
  }
  pauseBtn.addEventListener('click', () => setPaused(!app.classList.contains('paused')));
  replayBtn.addEventListener('click', startPromptCycle);
  skipBtn.addEventListener('click', skipGuidance);

  // ── Ambient stream sound (synthesized) ──
  const audio = (() => {
    let ctx, src, gain, lp, hp, lfo, lfoG, started = false;
    function start() {
      if (started) return; started = true;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      ctx = new Ctx();
      const N = 2 * ctx.sampleRate;
      const buf = ctx.createBuffer(1, N, ctx.sampleRate);
      const d = buf.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i=0;i<N;i++){
        const w = Math.random()*2-1;
        b0 = 0.99886*b0+w*0.0555179;
        b1 = 0.99332*b1+w*0.0750759;
        b2 = 0.96900*b2+w*0.1538520;
        b3 = 0.86650*b3+w*0.3104856;
        b4 = 0.55000*b4+w*0.5329522;
        b5 = -0.7616*b5-w*0.0168980;
        d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.08;
        b6 = w*0.115926;
      }
      src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
      lp = ctx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=900; lp.Q.value=0.7;
      hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=220;
      gain = ctx.createGain(); gain.gain.value = 0;
      lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
      lfoG = ctx.createGain(); lfoG.gain.value = 200;
      lfo.connect(lfoG).connect(lp.frequency); lfo.start();
      src.connect(hp).connect(lp).connect(gain).connect(ctx.destination);
      src.start();
    }
    function fade(t, s=1.5){
      if (!ctx) return;
      const n = ctx.currentTime;
      gain.gain.cancelScheduledValues(n);
      gain.gain.setValueAtTime(gain.gain.value, n);
      gain.gain.linearRampToValueAtTime(t, n+s);
    }
    return {
      resume(){ try { start(); if (ctx && ctx.state==='suspended') ctx.resume(); fade(0.18, 2.0); } catch(e){} },
      pause(){ if (ctx) fade(0, 1.0); }
    };
  })();
  let audioOn = true, audioArmed = false;
  function arm(){ if (audioArmed) return; audioArmed = true; if (audioOn) audio.resume(); }
  document.addEventListener('pointerdown', arm, { once: true });
  document.addEventListener('keydown',     arm, { once: true });

  soundBtn.addEventListener('click', () => {
    audioOn = !audioOn;
    soundBtn.setAttribute('aria-pressed', audioOn ? 'true' : 'false');
    if (audioOn) audio.resume(); else audio.pause();
  });

  // Boot
  startPromptCycle();
  startAmbientLeaves();

  document.addEventListener('keydown', (e) => {
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); setPaused(!app.classList.contains('paused')); }
  });
})();
</script>

</body>
</html>
